<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Moto Runner 2D</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#111;}
    #hud{position:fixed;top:10px;left:10px;color:#fff;font:14px system-ui;z-index:2}
    #hud b{color:#7ef}
    #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);color:#fff;font:16px system-ui;z-index:3;text-align:center}
    .btn{background:#1f5;color:#000;padding:10px 14px;border-radius:10px;font-weight:700;cursor:pointer;user-select:none}
    canvas{width:100%;height:100%;display:block}
  </style>
</head>
<body>
  <div id="hud">Distancia: <b id="dist">0</b> | Velocidad: <b id="spd">1</b> | Record: <b id="best">0</b> <span style="opacity:.4;font-size:10px">v2.0.0</span></div>
  <div id="overlay"><div><div><b>Moto Runner 2D</b></div><div>Espacio / Tap para saltar · Deslizá para esquivar</div><div class="btn" id="startBtn">Iniciar</div></div></div>
  <canvas id="game"></canvas>
  <script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const distEl = document.getElementById('dist');
  const spdEl = document.getElementById('spd');
  const bestEl = document.getElementById('best');

  let W,H;
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  let running=false, paused=false;
  let speed=4, distance=0, best=+localStorage.getItem('moto_best')||0;
  let player={x:120,y:0,w:50,h:30,vy:0,onGround:true, lane:0};
  let obstacles=[];
  let lastSpawn=0;

  function reset(){
    speed=4; distance=0; obstacles=[]; player.y=H-120; player.vy=0; player.onGround=true; player.lane=0;
  }

  function spawnObstacle(){
    const type=Math.random()<0.5?'block':'barrel';
    const lane=Math.random()<0.5?-1:1; // top/bottom lane
    const y = lane===-1? H-200 : H-120;
    obstacles.push({x:W+50,y,w:40,h:40,type});
  }

  function jump(){ if(player.onGround){ player.vy=-14; player.onGround=false; } }
  function dodge(dir){ // up/down
    player.lane = Math.max(-1, Math.min(1, player.lane+dir));
  }

  function update(dt){
    distance += speed*dt*10; // meters
    if(distance%500<5) speed+=0.005; // increase slowly

    // gravity
    player.vy += 0.8; player.y += player.vy; 
    const ground = H-120 + (player.lane===-1?-40:0);
    if(player.y>=ground){ player.y=ground; player.vy=0; player.onGround=true; }

    // spawn
    lastSpawn += dt;
    if(lastSpawn>1.2){ spawnObstacle(); lastSpawn=0; }

    // move obstacles
    for(let i=obstacles.length-1;i>=0;i--){
      obstacles[i].x -= speed*dt*60;
      if(obstacles[i].x<-60) obstacles.splice(i,1);
    }

    // collision
    for(const o of obstacles){
      if(player.x < o.x+o.w && player.x+player.w > o.x && player.y < o.y+o.h && player.y+player.h > o.y){
        running=false; overlay.style.display='flex';
        if(distance>best){ best=Math.floor(distance); localStorage.setItem('moto_best', best); }
        overlay.innerHTML = `<div><div><b>Game Over</b></div><div>Distancia: ${Math.floor(distance)}</div><div class='btn' id='restartBtn'>Reiniciar</div></div>`;
        document.getElementById('restartBtn').onclick = ()=>{overlay.style.display='none'; reset(); running=true;};
        break;
      }
    }
  }

  function draw(){
    ctx.fillStyle='#111'; ctx.fillRect(0,0,W,H);
    // road
    ctx.fillStyle='#222'; ctx.fillRect(0,H-180,W,120);
    ctx.strokeStyle='#444'; ctx.setLineDash([10,10]); ctx.beginPath(); ctx.moveTo(0,H-150); ctx.lineTo(W,H-150); ctx.stroke(); ctx.setLineDash([]);

    // player
    ctx.fillStyle='#0ff'; ctx.fillRect(player.x,player.y,player.w,player.h);

    // obstacles
    ctx.fillStyle='#f55';
    obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h));

    distEl.textContent = Math.floor(distance);
    spdEl.textContent = speed.toFixed(1);
    bestEl.textContent = best;
  }

  let last=performance.now();
  function loop(t){
    const dt=(t-last)/1000; last=t;
    if(running){ update(dt); }
    draw(); requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // controls
  document.addEventListener('keydown', e=>{
    if(e.code==='Space') jump();
    if(e.code==='ArrowUp') dodge(-1);
    if(e.code==='ArrowDown') dodge(1);
  });
  canvas.addEventListener('click', jump);
  let touchY=null;
  canvas.addEventListener('touchstart', e=>{ touchY=e.touches[0].clientY; jump(); }, {passive:true});
  canvas.addEventListener('touchmove', e=>{
    if(touchY===null) return;
    const dy=e.touches[0].clientY-touchY;
    if(dy>40){ dodge(1); touchY=e.touches[0].clientY; }
    if(dy<-40){ dodge(-1); touchY=e.touches[0].clientY; }
  }, {passive:true});
  canvas.addEventListener('touchend', ()=>{ touchY=null; });

  function start(){ overlay.style.display='none'; reset(); running=true; }
  startBtn.onclick=start; overlay.onclick=start;
  </script>
</body>
</html>
